<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Kochanet Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 45px 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 8px;
            font-size: 18px;
            line-height: 1;
        }

        .toggle-password:hover {
            color: #333;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            line-height: 1.5;
        }

        .requirement {
            display: block;
            padding: 4px 0;
        }

        .requirement.valid {
            color: #28a745;
        }

        .requirement.invalid {
            color: #dc3545;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Kochanet</h1>
            <p>Collaborative Chat Platform</p>
        </div>

        <h2>Reset Your Password</h2>
        <p class="subtitle">
            Please enter your new password. Make sure it's strong and secure.
        </p>

        <div id="messageBox" class="message"></div>

        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter new password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                >
                <button type="button" class="toggle-password" onclick="togglePassword('password')">
                    👁️
                </button>
                <div class="password-requirements">
                    <span class="requirement" id="req-length">• At least 8 characters</span>
                    <span class="requirement" id="req-uppercase">• One uppercase letter</span>
                    <span class="requirement" id="req-lowercase">• One lowercase letter</span>
                    <span class="requirement" id="req-number">• One number</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Confirm new password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                >
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                    👁️
                </button>
            </div>

            <button type="submit" id="submitBtn">
                Reset Password
            </button>
        </form>

        <div class="back-link">
            <a href="/auth/login">Back to Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        // Get API base URL and token from URL
        const API_BASE_URL = window.location.origin;
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const otp = urlParams.get('otp');
        const email = urlParams.get('email');

        // Check if token or OTP is present
        if (!token && !otp) {
            showMessage('Invalid reset link. Please request a new password reset.', 'error');
            submitBtn.disabled = true;
        }

        function showMessage(message, type) {
            messageBox.textContent = message;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';
        }

        function hideMessage() {
            messageBox.style.display = 'none';
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Password validation
        const requirements = {
            length: /^.{8,}$/,
            uppercase: /[A-Z]/,
            lowercase: /[a-z]/,
            number: /[0-9]/,
        };

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;

            document.getElementById('req-length').className =
                requirements.length.test(password) ? 'requirement valid' : 'requirement invalid';
            document.getElementById('req-uppercase').className =
                requirements.uppercase.test(password) ? 'requirement valid' : 'requirement invalid';
            document.getElementById('req-lowercase').className =
                requirements.lowercase.test(password) ? 'requirement valid' : 'requirement invalid';
            document.getElementById('req-number').className =
                requirements.number.test(password) ? 'requirement valid' : 'requirement invalid';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validate password
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }

            if (!/[A-Z]/.test(password)) {
                showMessage('Password must contain at least one uppercase letter', 'error');
                return;
            }

            if (!/[a-z]/.test(password)) {
                showMessage('Password must contain at least one lowercase letter', 'error');
                return;
            }

            if (!/[0-9]/.test(password)) {
                showMessage('Password must contain at least one number', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            // Disable form
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Resetting...';
            passwordInput.disabled = true;
            confirmPasswordInput.disabled = true;

            try {
                const payload = { password };

                // Add token or OTP/email to payload
                if (token) {
                    payload.token = token;
                } else if (otp && email) {
                    payload.otp = otp;
                    payload.email = email;
                }

                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showMessage(
                        'Password reset successfully! Redirecting to login...',
                        'success'
                    );

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/auth/login';
                    }, 2000);
                } else {
                    showMessage(
                        data.message || 'Failed to reset password. Please try again.',
                        'error'
                    );
                    // Re-enable form
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Reset Password';
                    passwordInput.disabled = false;
                    confirmPasswordInput.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(
                    'An error occurred. Please check your internet connection and try again.',
                    'error'
                );
                // Re-enable form
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
                passwordInput.disabled = false;
                confirmPasswordInput.disabled = false;
            }
        });
    </script>
</body>
</html>
